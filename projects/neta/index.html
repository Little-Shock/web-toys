<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>夜十字魔王城 | The Night Cross Citadel</title>
    
    <!-- 核心库 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <!-- 字体库 -->
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        :root {
            --c-gold: #FFD700;
            --c-gold-dim: #998100;
            --c-bg-dark: #050505;
            --c-panel-bg: rgba(10, 10, 12, 0.95);
        }

        body {
            background-color: var(--c-bg-dark);
            color: #E0E0E0;
            font-family: 'Noto Serif SC', serif;
            overflow: hidden;
            margin: 0;
        }

        .font-epic { font-family: 'Ma Shan Zheng', cursive; }

        /* 隐藏滚动条但保留功能 */
        .no-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .no-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 215, 0, 0.2);
            border-radius: 2px;
        }
        .no-scrollbar:hover::-webkit-scrollbar-thumb {
            background: rgba(255, 215, 0, 0.5);
        }

        /* 布局容器 */
        .layout-container {
            display: flex;
            width: 100vw;
            height: 100vh;
        }

        /* 左侧信息面板 */
        .info-panel {
            width: 500px;
            flex-shrink: 0;
            background: var(--c-panel-bg);
            border-right: 1px solid rgba(255, 215, 0, 0.15);
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 20;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
        }

        /* 右侧展示区 */
        .showcase-area {
            flex-grow: 1;
            position: relative;
            background: #000;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 图片容器 */
        .image-container {
            width: 100%;
            height: 100%;
            padding: 40px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
            position: absolute;
            opacity: 0;
            transform: scale(0.95);
        }
        
        .main-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* 装饰性背景 */
        .bg-pattern {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%231a1a1a' fill-opacity='0.4'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            opacity: 0.5;
            z-index: 0;
            pointer-events: none;
        }

        /* 导航点 */
        .nav-dots {
            position: absolute;
            right: 30px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 50;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .dot {
            width: 8px;
            height: 8px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s;
        }
        .dot.active {
            background: var(--c-gold);
            transform: scale(1.5);
            box-shadow: 0 0 10px var(--c-gold);
        }

        /* 文本样式 */
        .text-gold-gradient {
            background: linear-gradient(to bottom, #FFD700, #B8860B);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .section-title {
            position: relative;
            display: inline-block;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            color: var(--c-gold);
            font-weight: bold;
        }
        .section-title::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 40px;
            height: 2px;
            background: var(--c-gold);
        }

        .info-block {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 12px 15px;
            margin-bottom: 12px;
            border-radius: 4px;
        }
        .info-block:hover {
            border-color: rgba(255,215,0,0.2);
        }

        .facility-item {
            margin-bottom: 10px;
            padding-left: 12px;
            border-left: 2px solid rgba(255,215,0,0.3);
        }

        /* 按钮 */
        .nav-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: rgba(255,255,255,0.6);
            padding: 10px 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Noto Serif SC', serif;
        }
        .nav-btn:hover {
            border-color: var(--c-gold);
            color: var(--c-gold);
        }
        
        /* 开屏 */
        .intro-screen {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .enter-btn {
            margin-top: 3rem;
            padding: 1rem 3rem;
            border: 1px solid var(--c-gold);
            color: var(--c-gold);
            font-family: 'Noto Serif SC', serif;
            font-size: 1.2rem;
            letter-spacing: 0.2em;
            background: transparent;
            cursor: pointer;
            transition: all 0.4s ease;
        }
        .enter-btn:hover {
            background: var(--c-gold);
            color: #000;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
        }

        .fade-enter-active, .fade-leave-active {
            transition: opacity 0.8s ease;
        }
        .fade-enter-from, .fade-leave-to {
            opacity: 0;
        }

        /* 详细内容样式 */
        .detail-text {
            font-size: 14px;
            line-height: 1.8;
            color: #b0b0b0;
        }
        .detail-text strong {
            color: #e0e0e0;
        }
        /* 移动端适配 */
        @media (max-width: 768px) {
            .layout-container {
                flex-direction: column;
            }

            .showcase-area {
                height: 45vh;
                width: 100%;
                order: 1;
                flex-grow: 0;
            }

            .info-panel {
                width: 100%;
                height: 55vh;
                order: 2;
                border-right: none;
                border-top: 1px solid rgba(255, 215, 0, 0.15);
            }

            .nav-dots {
                right: auto;
                left: 50%;
                bottom: 20px;
                top: auto;
                transform: translateX(-50%);
                flex-direction: row;
                width: auto;
            }
            
            .image-container {
                padding: 20px;
            }

            .intro-screen h1 {
                font-size: 3rem !important; /* Override text-7xl */
                line-height: 1.2;
                text-align: center;
            }
            
            .intro-screen .text-xl {
                font-size: 1rem !important;
                letter-spacing: 0.2em !important;
            }
        }
    </style>
</head>
<body>
    <div id="app" class="h-screen w-screen overflow-hidden">
        
        <!-- 开屏页面 -->
        <transition name="fade">
            <div v-if="showIntro" class="intro-screen">
                <h1 class="text-7xl font-epic text-gold-gradient mb-4 tracking-widest drop-shadow-[0_0_15px_rgba(255,215,0,0.3)]">
                    夜十字魔王城
                </h1>
                <div class="text-xl text-gray-500 tracking-[0.5em] uppercase font-light border-t border-b border-gray-800 py-2">
                    The Night Cross Citadel
                </div>
                <button @click="enterSite" class="enter-btn">
                    进入领域 · ENTER
                </button>
            </div>
        </transition>

        <!-- 主界面 -->
        <div v-show="!showIntro" class="layout-container">
            <!-- 左侧：信息面板 -->
            <div class="info-panel" @wheel.stop>
                <!-- 顶部 Logo -->
                <div class="p-6 border-b border-white/10 flex-shrink-0">
                    <h1 class="text-2xl font-epic text-gold-gradient tracking-widest cursor-pointer" @click="showIntro=true">
                        夜十字魔王城
                    </h1>
                    <div class="text-xs text-gray-500 mt-1 tracking-[0.2em] uppercase">The Night Cross Citadel</div>
                </div>

                <!-- 滚动内容区 -->
                <div class="flex-grow overflow-y-auto no-scrollbar p-6 relative" ref="scrollContainer" @wheel.stop>
                    <transition name="fade" mode="out-in">
                        <div :key="currentSlide.title">
                            <!-- 小标题 -->
                            <div class="text-[#B8860B] font-bold tracking-widest text-xs mb-2 uppercase">
                                {{ currentSlide.subTitle }}
                            </div>

                            <!-- 主标题 -->
                            <h2 class="text-3xl text-white font-bold mb-4 font-epic leading-tight">
                                {{ currentSlide.title }}
                            </h2>

                            <!-- 核心定位 -->
                            <blockquote class="border-l-2 border-[#FFD700] pl-4 py-2 my-4 text-gray-300 italic bg-white/5 rounded-r text-sm">
                                {{ currentSlide.core }}
                            </blockquote>

                            <!-- 完整详细内容 (HTML渲染) -->
                            <div class="detail-text" v-html="currentSlide.fullContent"></div>

                        </div>
                    </transition>
                </div>

                <!-- 底部控制栏 -->
                <div class="p-4 border-t border-white/10 flex justify-between items-center bg-black/20 flex-shrink-0">
                    <button @click="prevSlide" class="nav-btn group text-sm" :disabled="currentIndex === 0">
                        <i class="fas fa-arrow-left mr-2"></i> PREV
                    </button>
                    <span class="text-[#FFD700] font-mono text-lg">
                        {{ String(currentIndex + 1).padStart(2, '0') }} <span class="text-gray-600 text-xs">/ {{ slides.length }}</span>
                    </span>
                    <button @click="nextSlide" class="nav-btn group text-sm" :disabled="currentIndex === slides.length - 1">
                        NEXT <i class="fas fa-arrow-right ml-2"></i>
                    </button>
                </div>
            </div>

            <!-- 右侧：图片展示 -->
            <div class="showcase-area">
                <div class="bg-pattern"></div>
                
                <div class="image-container" ref="imageContainer">
                    <img :src="getImagePath(currentSlide.image)" 
                         class="main-image" 
                         :alt="currentSlide.title">
                </div>

                <div class="nav-dots">
                    <div v-for="(slide, index) in slides" :key="index"
                         class="dot"
                         :class="{ 'active': currentIndex === index }"
                         @click="goToSlide(index)"
                         :title="slide.title">
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        const { createApp, ref, computed, onMounted, onUnmounted, nextTick } = Vue;

        createApp({
            setup() {
                const showIntro = ref(true);
                const currentIndex = ref(0);
                const imageContainer = ref(null);
                const scrollContainer = ref(null);
                const isAnimating = ref(false);

                const slides = [
                    // ========== 基础设定 ==========
                    {
                        subTitle: "The Demon Lord",
                        title: "魔王 · 牧野世流",
                        core: "穿越而来的新任魔王，没有魔力却掌握着魔王城的一切",
                        image: "[基础设定] 魔王.png",
                        fullContent: `
                            <p class="mb-4">现任魔王为<strong>牧野 世流</strong>，是个个性有些阴郁的社恐少女，是没有魔力，不会魔法的人类。她有一本精心制作的魔物设定集，网名为夜十字。</p>
                            <p class="mb-4">一天，她在暗巷里发现一个闪着紫光的传送门。"是否前往魔王城？"</p>
                            <p class="mb-4">厌倦了现实世界的她踏入了门中，成为了魔王。</p>
                            <div class="section-title mt-6">魔王的能力</div>
                            <ul class="list-disc list-inside space-y-2 text-gray-400">
                                <li>使用召唤卡牌在召唤台召唤魔物，并与魔物签订契约。</li>
                                <li>当魔王看向魔王城里的设施，会显示出解释窗口与教程演示。</li>
                            </ul>
                        `
                    },
                    {
                        subTitle: "Origin State",
                        title: "夜十字魔王城",
                        core: "一座被风暴包围的废墟城，唯有召唤台完好无损",
                        image: "[基础设定] 夜十字魔王城.png",
                        fullContent: `
                            <p class="mb-4">一座被风暴包围的废墟城，包含<strong>地下城、庭院与城堡</strong>三部分。</p>
                            <p class="mb-4">魔王初次到来时，这里十分破败：城墙倒塌，洞窟塌陷……唯有地下一层的召唤台完好无损，闪烁着微弱的紫色光芒。</p>
                        `
                    },
                    {
                        subTitle: "Structure Diagram",
                        title: "城堡整体架构",
                        core: "十七层中央主塔与四大副塔，以及深入地底的地下城",
                        image: "[城堡] 整体架构.png",
                        fullContent: `
                            <div class="section-title">核心主体</div>
                            <p class="mb-4"><strong>中央主塔</strong>（17层核心，含魔王寝宫、议事厅、图书馆等核心功能）</p>
                            
                            <div class="section-title mt-6">四大副塔</div>
                            <p class="mb-4">环绕主塔分布，通过空中连廊（3层、8层、15层）互通，承接星象、龙族、雷电、军械专属功能</p>
                            
                            <div class="section-title mt-6">跨层设施</div>
                            <ul class="list-disc list-inside space-y-2 text-gray-400">
                                <li>中央旋转楼梯（贯穿全塔）</li>
                                <li>魔法升降梯（连接各功能区）</li>
                                <li>地下通道（直通地下城第一层）</li>
                            </ul>
                        `
                    },
                    {
                        subTitle: "Resource System",
                        title: "魔王城三大能源物质",
                        core: "燃素、电晶体、魔力——维持魔王城运转的三大基石",
                        image: "[资源] 燃素电晶体魔力.png",
                        fullContent: `
                            <div class="section-title">燃素</div>
                            <p class="mb-4">魔王城建设所需的重要资源之一，至纯的火元素，魔王城三大能源物质之一，可用于燃烧，能源供应，烹饪，取暖，可与魔力等资源进行转换，由煤矿，木材及火系魔物产出。</p>
                            
                            <div class="section-title mt-6">电晶体</div>
                            <p class="mb-4">魔王城建设所需的重要资源之一，将雷电储存到水晶矿中得到的物质，魔王城三大能源之一，可用于能源供应，武器制作，设备制作等，可与魔力等资源进行转换，由雷电塔将雷电复合至水晶矿上产出。</p>
                            
                            <div class="section-title mt-6">魔力</div>
                            <p class="mb-4">魔王城建设所需的重要资源之一，几乎所有魔王城设施运作所需的能量，魔王城三大能源物质之一，用途广泛，产出多样。</p>
                        `
                    },
                    {
                        subTitle: "Summoning System",
                        title: "异界召唤仪式",
                        core: "以魔力为代价，从异世界召唤魔物来到魔王城",
                        image: "[基础设定] 召唤.png",
                        fullContent: `
                            <p class="mb-4">生物来往魔王城的方式，通过魔王城地下一层的召唤台，魔王能够使用附有魔物信息的<strong>召唤卡牌</strong>，以魔力池中的魔力为代价从其他世界召唤符合特征的魔物来到魔王城。</p>
                            <p class="mb-4">一扇紫色的传送门会出现在"最可能被召唤"且"最符合条件"的魔物面前，附有相应的"<strong>召唤契约</strong>"，魔物踏入传送门，就会来到夜十字魔王城。</p>
                            <p class="mb-4">夜十字魔王城的大部分魔物，包括魔王都是被召唤至此。而召唤魔王的人目前尚未可知。</p>
                        `
                    },
                    // ========== 地下城各层 ==========
                    {
                        subTitle: "Floor 01",
                        title: "第一层：地下城大厅",
                        core: "独占层·全功能中枢——魔王城地下城的门户枢纽",
                        image: "第一层 地下城大厅.png",
                        fullContent: `
                            <div class="section-title">核心定位</div>
                            <p class="mb-4">魔王城地下城的"门户枢纽"，高度魔法化改造，兼顾交通、召唤、物流与行政功能，是所有魔物与访客的第一站。</p>
                            
                            <div class="section-title mt-6">环境与温度</div>
                            <div class="info-block">
                                <p><strong>环境：</strong>天然穹顶洞窟（高50米，直径1000米），岩壁被魔法符文覆盖，泛着柔和的蓝紫色光芒，地面铺有防滑黑曜石砖，无自然障碍物，视野开阔。</p>
                                <p class="mt-2"><strong>温度：</strong>恒温22℃，由魔法阵调节，四季如春，适配所有种族魔物活动。</p>
                            </div>
                            
                            <div class="section-title mt-6">矿物与基础</div>
                            <p class="mb-4">岩壁富含"辉光石"，无需额外照明，符文可调节亮度；地下埋设"传导水晶"，为全层魔法设施供能。</p>
                            
                            <div class="section-title mt-6">核心设施</div>
                            <div class="facility-item">
                                <p><strong>1. 中央传送广场</strong></p>
                                <p class="text-gray-500 text-sm">占地3000㎡，中心是直径15米的巨型传送台（可连接地表魔王城、第二层商业中心、第七层水晶矿脉），四周分布8个小型传送点（通往各层宿舍区）。</p>
                            </div>
                            <div class="facility-item">
                                <p><strong>2. 召唤台</strong></p>
                                <p class="text-gray-500 text-sm">广场东侧，外观古老的祭坛，在魔王城诞生之初就已存在，周围环绕"召唤魔力池"，以水晶矿为燃料，是魔王"夜"召唤魔物来到魔王城的地方。</p>
                            </div>
                            <div class="facility-item">
                                <p><strong>3. 物流中枢</strong></p>
                                <p class="text-gray-500 text-sm">广场西侧，包含"重力传送带"（连接第二层仓库与各层资源点）、"次元储物间"（由空间魔物看管，储存跨层运输的物资）、"登记处"（魔物进出、物资流通需登记，由石像鬼守卫）。</p>
                            </div>
                            <div class="facility-item">
                                <p><strong>4. 行政办公厅</strong></p>
                                <p class="text-gray-500 text-sm">洞窟北侧独立石室，魔王直属秘书团办公地，处理地下城日常事务，配备"魔法通讯镜"（监控）连接各层管理处。</p>
                            </div>
                            <div class="facility-item">
                                <p><strong>5. 地下城信号站</strong></p>
                                <p class="text-gray-500 text-sm">魔法通讯设备，兼具收发信号，自动翻译等功能的巨大炼金矩阵，是魔王城的网络信号来源。</p>
                            </div>
                            
                            <div class="section-title mt-6">生态与魔物</div>

                    },
                    {

                        title: "终层：深渊入口",
                        core: "禁区·最终连接层——魔王城地下城的终点",
                        image: "终层 深渊入口.png",
                        fullContent: `

                            </div>
                            
                            <div class="section-title mt-6">矿物与基础</div>
                            <p class="mb-4"><strong>核心资源：</strong>深渊结晶（深渊魔力凝结的晶体，蕴含极强黑暗魔力，是顶级魔法道具核心）、深渊矿石（可炼制黑暗属性武器/铠甲，韧性与魔力传导性极强）。</p>
                            
                            <div class="section-title mt-6">核心设施</div>
                            <p class="mb-2 text-gray-500"><em>几乎未作开发。</em></p>
                            <div class="facility-item">
                                <p><strong>深渊结界台</strong></p>
                                <p class="text-gray-500 text-sm">环绕深渊裂隙的环形平台，设9座"结界柱"（由深渊结晶与魔力水晶共同打造），由魔王与高阶巫妖共同维护，可调节深渊裂隙的开合大小，阻止深渊魔物大规模溢出，同时筛选允许进入地下城的深渊魔物（如契约魔物、归顺的高阶深渊生物）。</p>

                ];

                const currentSlide = computed(() => slides[currentIndex.value]);

                const getImagePath = (filename) => {
                    return `./assets/${filename}`;
                };
                
                const enterSite = () => {
                    showIntro.value = false;
                    setTimeout(() => {
                        animateSlide(null); 
                    }, 500);
                };

                const animateSlide = (direction) => {
                    if (isAnimating.value) return;
                    isAnimating.value = true;

                    gsap.to(imageContainer.value, {
                        opacity: 0,
                        scale: 0.9,
                        duration: 0.3,
                        onComplete: () => {
                            if (direction === 'next' && currentIndex.value < slides.length - 1) {
                                currentIndex.value++;
                            } else if (direction === 'prev' && currentIndex.value > 0) {
                                currentIndex.value--;
                            } else if (typeof direction === 'number') {
                                currentIndex.value = direction;
                            }
                            
                            if (scrollContainer.value) scrollContainer.value.scrollTop = 0;

                            nextTick(() => {
                                gsap.to(imageContainer.value, {
                                    opacity: 1,
                                    scale: 1,
                                    duration: 0.5,
                                    ease: "power2.out",
                                    onComplete: () => { isAnimating.value = false; }
                                });
                            });
                        }
                    });
                };

                const nextSlide = () => animateSlide('next');
                const prevSlide = () => animateSlide('prev');
                const goToSlide = (index) => animateSlide(index);

                const handleWheel = (e) => {
                    if (showIntro.value) return;
                    if (Math.abs(e.deltaY) < 30 || isAnimating.value) return;
                    if (e.deltaY > 0) nextSlide();
                    else prevSlide();
                };

                onMounted(() => {
                    window.addEventListener('wheel', handleWheel);
                });

                onUnmounted(() => {
                    window.removeEventListener('wheel', handleWheel);
                });

                return {
                    showIntro,
                    enterSite,
                    currentIndex,
                    slides,
                    currentSlide,
                    nextSlide,
                    prevSlide,
                    goToSlide,
                    getImagePath,
                    imageContainer,
                    scrollContainer
                };
            }
        }).mount('#app');

        // Global Swipe Support
        let touchStartX = 0;
        let touchEndX = 0;

        document.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        });

        document.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            handleGesture();
        });

        function handleGesture() {
            if (touchEndX < touchStartX - 50) {
                // Swipe Left -> Next
                 document.querySelector('.fa-arrow-right')?.parentElement.click();
            }
            if (touchEndX > touchStartX + 50) {
                // Swipe Right -> Prev
                document.querySelector('.fa-arrow-left')?.parentElement.click();
            }
        }
    </script>
</body>
